<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Name - Professional Resume</title>
    <style>
        /* CSS Styles */
        body { font-family: Arial, sans-serif; line-height: 1.6; margin: 0; padding: 0; background: #f4f4f4; }
        .container { max-width: 800px; margin: 30px auto; background: #fff; padding: 40px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        header { border-bottom: 2px solid #333; padding-bottom: 20px; margin-bottom: 20px; }
        h1 { margin: 0; color: #333; }
        .contact-info { color: #666; font-size: 0.9em; }
        section { margin-bottom: 25px; }
        h2 { border-bottom: 1px solid #ccc; padding-bottom: 5px; color: #444; text-transform: uppercase; font-size: 1.2em; }
        .job, .education { margin-bottom: 15px; }
        .job-title { font-weight: bold; color: #333; }
        .job-meta { font-style: italic; color: #777; font-size: 0.9em; }
        ul { padding-left: 20px; }
        .skills-list { display: flex; flex-wrap: wrap; list-style: none; padding: 0; }
        .skills-list li { background: #eee; margin: 5px; padding: 5px 15px; border-radius: 4px; font-size: 0.9em; }
        @media print { .container { box-shadow: none; margin: 0; width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Your Name</h1>
            <div class="contact-info">Email: yourname@email.com</div>
        </header>
        <section id="summary"><h2>Summary</h2><p>Results-oriented Web Developer.</p></section>
        <section id="experience"><h2>Experience</h2><p>Senior Developer | 2021-Present</p></section>
    </div>
</body>
</html>
